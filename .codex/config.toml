[features]
hooks = true

# App Settings MCP (L2 owner bridge, :3218) — lets this agent read/set the app's
# branding/SEO/PWA settings + language set through the validated setter. Streamable
# HTTP transport; token read from the HERMES_MCP_SECRET env var (exported by the
# deploy). On localhost the bridge currently accepts calls without a token too.
[mcp_servers.app-settings-bridge]
url = "http://localhost:3218"
bearer_token_env_var = "HERMES_MCP_SECRET"

# Content CRUD MCP (L2 owner bridge, :3226) — create/edit/delete a content GROUP (tab)
# or PAGE (post): deterministic file CRUD, no code generation. owner_content_manage_collection.
[mcp_servers.content-crud-bridge]
url = "http://localhost:3226"
bearer_token_env_var = "HERMES_MCP_SECRET"

# Content Orchestrator MCP (L2 owner bridge, :3227) — frozen process: intent → decompose by
# state → per sub-step open→build→deploy→record(gate)→close. owner_content_orchestrate + owner_report_blocker_step.
[mcp_servers.content-orchestrator-bridge]
url = "http://localhost:3227"
bearer_token_env_var = "HERMES_MCP_SECRET"

# Language Expansion MCP (L2 owner bridge, :3228) — THE only way to add a language to existing
# content: fan out seeded with the default language (noindex until translated) + one translation
# step per language; plus the non-blocking translation runner. owner_content_add_site_language +
# owner_content_translate_pending. Step 163.
[mcp_servers.language-expansion-bridge]
url = "http://localhost:3228"
bearer_token_env_var = "HERMES_MCP_SECRET"
